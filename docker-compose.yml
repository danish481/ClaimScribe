version: "3.8"

services:
  # ── MLflow UI (reads from backend file store) ─────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: claimscribe-mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
    command: >
      mlflow server
      --backend-store-uri file:///app/data/mlruns
      --default-artifact-root /app/data/mlruns
      --host 0.0.0.0
      --port 5000
    networks:
      - claimscribe-network

  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: claimscribe-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=production
      - MLFLOW_TRACKING_URI=file:///app/data/mlruns
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-2.5-flash
      - SECRET_KEY=${SECRET_KEY:-claimscribe-secret-key-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - DATABASE_URL=sqlite:////app/data/claimscribe.db
      - UPLOAD_DIR=./data/uploads
      - MAX_FILE_SIZE=50000000
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:5174,http://localhost:5173,http://localhost:8001,http://frontend:5173
    volumes:
      - ./data:/app/data
    depends_on:
      - mlflow
    networks:
      - claimscribe-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8001
    container_name: claimscribe-frontend
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:8001
      - VITE_MLFLOW_URL=http://localhost:5001
    depends_on:
      - backend
    networks:
      - claimscribe-network
    restart: unless-stopped

networks:
  claimscribe-network:
    driver: bridge

# data/ is now a bind-mount to ./data on the host — no named volumes needed
